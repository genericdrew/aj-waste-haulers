{{- $nav := site.Data.content.nav -}}
<header class="site-header" role="banner">
  <div class="container site-header__inner">
    <a href="/" class="site-header__logo" aria-label="{{ $nav.logo }} home">
      AJ Liquid<span>.</span>
    </a>
    <nav class="site-header__nav" aria-label="Primary">
      <ul class="site-header__nav-links">
        {{- range $nav.links }}
        <li><a href="{{ .href }}">{{ .text }}</a></li>
        {{- end }}
      </ul>
    </nav>
    <div class="site-header__actions">
      <a href="{{ $nav.phone_href | safeURL }}" class="site-header__phone" aria-label="Call {{ $nav.phone }}">
        <svg class="site-header__phone-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.79 19.79 0 0 1 2.12 4.18 2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92Z"/></svg>
        <span>{{ $nav.phone }}</span>
      </a>
      <a href="{{ $nav.cta_href | safeURL }}" class="btn btn-primary btn-sm">{{ $nav.cta }}</a>
      <button class="nav-toggle" aria-label="Open menu" aria-expanded="false" aria-controls="mobile-drawer" data-nav-toggle>
        <span class="nav-toggle__bar" aria-hidden="true"></span>
      </button>
    </div>
  </div>
</header>

<div id="mobile-drawer" class="mobile-drawer" aria-hidden="true" data-open="false">
  <div class="mobile-drawer__header">
    <span class="site-header__logo" style="color: var(--color-bone-50);">AJ Liquid<span>.</span></span>
    <button class="mobile-drawer__close" aria-label="Close menu" data-nav-close>✕</button>
  </div>
  <ul class="mobile-drawer__links">
    {{- range $nav.links }}
    <li><a href="{{ .href }}">{{ .text }}</a></li>
    {{- end }}
  </ul>
  <a href="{{ $nav.phone_href | safeURL }}" class="mobile-drawer__phone">{{ $nav.phone }}</a>
  <a href="{{ $nav.cta_href | safeURL }}" class="btn btn-primary" style="margin-top: 1rem; width: 100%;">{{ $nav.cta }}</a>
</div>
