{{- $sa := site.Data.content.service_area -}}
<section class="service-area-section section" aria-labelledby="service-area-heading">
  <div class="container">
    <header class="section-header">
      <span class="eyebrow">{{ $sa.eyebrow }}</span>
      <h2 id="service-area-heading">{{ $sa.headline }}</h2>
      <p>{{ $sa.body }}</p>
    </header>
    <div class="service-area__layout">
      <div class="service-area__map" role="img" aria-label="Service area map covering Hays, Travis, and Comal counties in Central Texas">
        <svg viewBox="0 0 500 380" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <pattern id="topo" patternUnits="userSpaceOnUse" width="18" height="18">
              <path d="M0 9 Q4.5 3 9 9 T 18 9" stroke="#E3E0D9" stroke-width="1" fill="none"/>
            </pattern>
          </defs>
          <rect width="500" height="380" fill="url(#topo)"/>
          <!-- County triangle simplified -->
          <path d="M70 80 L 430 70 L 380 330 L 90 320 Z" fill="#F2EDE4" stroke="#1C2E4A" stroke-width="2" opacity="0.6"/>
          <!-- Austin -->
          <g>
            <circle cx="310" cy="140" r="12" fill="#C07B3A"/>
            <text x="328" y="144" font-family="Inter, sans-serif" font-weight="600" font-size="14" fill="#0F1B2E">Austin</text>
          </g>
          <!-- Dripping Springs (HQ) -->
          <g>
            <circle cx="205" cy="185" r="16" fill="#0F1B2E"/>
            <circle cx="205" cy="185" r="22" fill="none" stroke="#C07B3A" stroke-width="2" stroke-dasharray="3 3"/>
            <text x="158" y="175" font-family="Inter, sans-serif" font-weight="600" font-size="13" fill="#0F1B2E">Dripping Springs</text>
            <text x="190" y="218" font-family="Inter, sans-serif" font-size="10" fill="#8A5525">HQ</text>
          </g>
          <!-- Driftwood -->
          <g>
            <circle cx="240" cy="210" r="9" fill="#2F4870"/>
            <text x="252" y="214" font-family="Inter, sans-serif" font-weight="500" font-size="12" fill="#0F1B2E">Driftwood</text>
          </g>
          <!-- Kyle -->
          <g>
            <circle cx="275" cy="225" r="11" fill="#C07B3A"/>
            <text x="290" y="229" font-family="Inter, sans-serif" font-weight="600" font-size="13" fill="#0F1B2E">Kyle</text>
          </g>
          <!-- New Braunfels -->
          <g>
            <circle cx="330" cy="290" r="12" fill="#C07B3A"/>
            <text x="348" y="294" font-family="Inter, sans-serif" font-weight="600" font-size="13" fill="#0F1B2E">New Braunfels</text>
          </g>
          <!-- County labels -->
          <text x="155" y="120" font-family="Playfair Display, serif" font-style="italic" font-size="11" fill="#5A5A5A" opacity="0.7">Hays County</text>
          <text x="340" y="100" font-family="Playfair Display, serif" font-style="italic" font-size="11" fill="#5A5A5A" opacity="0.7">Travis</text>
          <text x="330" y="330" font-family="Playfair Display, serif" font-style="italic" font-size="11" fill="#5A5A5A" opacity="0.7">Comal County</text>
        </svg>
      </div>
      <div class="service-area__cities">
        <form class="zip-widget" data-zip-widget>
          <label for="zip-input">{{ $sa.zip_widget_label }}</label>
          <div class="zip-widget__row">
            <input id="zip-input" class="zip-widget__input" type="text" inputmode="numeric" pattern="\d{5}" maxlength="5" placeholder="{{ $sa.zip_widget_hint }}" autocomplete="postal-code">
            <button type="submit" class="btn btn-primary btn-sm">Check</button>
          </div>
          <div class="zip-widget__result" role="status" aria-live="polite" data-zip-result></div>
        </form>
        <ul class="city-grid">
          {{- range $sa.primary_cities }}
          <li><a href="/service-area/{{ .slug }}/">{{ .name }}</a></li>
          {{- end }}
        </ul>
        {{- if $sa.secondary_cities }}
        <p class="secondary-cities">
          <strong>Also serving:</strong> {{ delimit $sa.secondary_cities " · " }}
        </p>
        {{- end }}
      </div>
    </div>
  </div>
</section>
