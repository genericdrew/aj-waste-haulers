{{- $s := site.Data.content.services -}}
{{- $icons := dict
  "septic" `<svg viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true"><path d="M6 18h28v14H6z"/><path d="M10 18v-4a10 10 0 0 1 20 0v4"/><path d="M14 24h12"/></svg>`
  "grease" `<svg viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true"><path d="M8 12h24l-2 20H10z"/><path d="M12 12V8h16v4"/></svg>`
  "barrel" `<svg viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true"><rect x="10" y="6" width="20" height="28" rx="4"/><path d="M10 14h20M10 26h20"/></svg>`
  "home-check" `<svg viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true"><path d="M6 20 20 8l14 12"/><path d="M9 18v16h22V18"/><path d="m16 24 3 3 6-6"/></svg>`
  "alert" `<svg viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true"><path d="m20 4 17 30H3L20 4z"/><path d="M20 16v8M20 28v2"/></svg>`
-}}
<section class="services" aria-labelledby="services-heading">
  <div class="container">
    <header class="section-header">
      <span class="eyebrow">{{ $s.eyebrow }}</span>
      <h2 id="services-heading">{{ $s.headline }}</h2>
      <p>{{ $s.subhead }}</p>
    </header>
    <div class="services__grid">
      {{- range $s.items }}
      <a href="/services/{{ .slug }}/" class="service-card">
        <span class="service-card__icon" aria-hidden="true">{{ index $icons .icon | safeHTML }}</span>
        <h3 class="service-card__title">{{ .name }}</h3>
        <p class="service-card__body">{{ .short }}</p>
        <span class="service-card__link">{{ .cta }}</span>
      </a>
      {{- end }}
    </div>
  </div>
</section>
