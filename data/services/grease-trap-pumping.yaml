faqs:
  - question: "What's the difference between a 90-day pump and a line flush?"
    answer: "Pumping removes everything in the trap. A line flush uses high-pressure water to clear grease buildup in the pipes running to and from the trap. We do both. Most restaurants need the pump quarterly and the flush annually — we'll tell you if yours needs more."
  - question: "Can you service our location without closing the kitchen?"
    answer: "Most of our commercial work happens overnight or between breakfast and lunch. Tell us your slow hours and we'll fit the schedule around them."
  - question: "What if we're outside Austin city limits?"
    answer: "Other jurisdictions have their own rules — generally less strict than Austin's, but most follow a 90-day or 'when 25–50% full' standard. We can advise on your local requirements."
  - question: "Do you handle lift station pumping for restaurants?"
    answer: "Yes, when the lift station is part of a commercial food service setup. Ask when you call and we'll scope the job."
