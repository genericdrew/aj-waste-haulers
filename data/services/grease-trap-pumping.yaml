compliance:
  heading: "Austin's rules in plain English"
  body: "If you run a food service business inside Austin city limits, grease trap pumping isn't optional. The rule: pump every 90 days or when grease/solids reach 50% wetted height. Fines run up to $2,000 per violation, and repeat offenders can be required to pump more often at their own cost."
  cta: "Full compliance guide"
  cta_href: "/grease-trap-compliance/"
