hero:
  eyebrow: "Restaurants & Commercial Kitchens"
  headline: "90 days. We'll keep the calendar."
  body: "Austin's FOG program requires grease trap pumping every 90 days — or sooner if solids hit 50% of the trap's wetted height. We run the schedule, pump during slow hours, and leave the paperwork an inspector can actually read."
what_we_do:
  heading: "Full grease trap service"
  body: "Interior under-sink traps, exterior in-ground interceptors, automatic grease recovery units — we service them all. Pumpout is start-to-finish: full removal of grease, solids, and liquid waste down to the wetted walls."
  bullets:
