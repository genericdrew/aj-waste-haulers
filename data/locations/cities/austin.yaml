hero:
  eyebrow: "Serving West & South Austin"
  headline: "Austin's a sewer town. Until it isn't."
  body: "Large parts of west and south Austin — the Barton Creek corridor, Bear Creek watershed, the FM 1826 acreage tracts toward Hays County — never got city sewer. That's where we work. Plus grease trap service for restaurants across the metro, on a 90-day cycle that keeps the city off your back."
local_context:
  heading: "Two things to know about Austin septic"
  body: "First: jurisdiction is messy. Austin Water, Travis County TNR, and LCRA all have authority depending on where the property sits. We'll help you figure out whose rule applies. Second: Austin has its own nitrogen-reduction rule that exceeds the state TCEQ minimum — Chapter 15-5 of the city code requires a 20 mg/L nitrogen cap on new systems in the Edwards Aquifer Recharge Zone and parts of the Contributing Zone. Not every hauler keeps up with that."
  callouts:
    - title: "Nitrogen-reduction systems"
      body: "Nitrogen-reducing and commercial aerobic systems inside Austin Water's jurisdiction require a perpetual maintenance contract with a certified service provider. Homeowners can't self-maintain."
    - title: "The Barton Springs Zone"
      body: "At least 9,470 OSSF permits exist in the Barton Springs segment of the Edwards Aquifer alone. Bear Creek has the highest density. We pump here often."
    - title: "90-day grease trap rule"
      body: "Inside city limits, food service grease traps must be pumped every 90 days or when grease/solids reach 50% of wetted height. Fines up to $2,000 per violation."
