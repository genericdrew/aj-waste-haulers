faq:
  meta_title: "Septic & Grease Trap FAQ | AJ Liquid Waste Haulers"
  meta_description: "Common questions about septic pumping frequency, grease trap cleaning, proof-of-pumpage, emergency service, and Hill Country septic care. Answered honestly by your Dripping Springs haulers."
  hero:
    eyebrow: "FAQ"
    headline: "What people actually ask us."
    body: "Organized by topic. Nothing here is filler — if a question made it to this page, it came from a real customer call."
  categories:
    - heading: "Septic Tank Pumping"
      items:
        - question: "How often does a septic tank need to be pumped?"
          answer: "TCEQ recommends every 3–5 years for most households. A 4-person family with a 1,000-gallon tank is closer to every 2.6 years per TCEQ's own table. Bigger family, garbage disposal, water softener tied into the tank — all shorten the interval."
        - question: "Can you pump a tank you can't see?"
          answer: "Usually yes. We probe, we dig the risers out, and we do it without tearing up your yard. Hard-to-find tanks are most of our work, not a special case."
        - question: "How long does a pumping take?"
          answer: "Thirty to ninety minutes for most residential jobs, start to finish. Commercial and beverage jobs can run longer depending on volume."
        - question: "What's proof-of-pumpage? Why do you keep mentioning it?"
          answer: "Our trucks carry electronic gallon meters. You see the number of gallons we remove from your tank. Your invoice matches that number. It's the simplest version of honest billing in a service where the work happens out of sight."
    - heading: "Grease Traps & Commercial"
      items:
        - question: "How often do I have to pump my grease trap?"
          answer: "Inside Austin city limits, every 90 days is the rule — or sooner if grease and solids hit 50% of the wetted height. Fines run up to $2,000 per violation. Outside Austin, requirements vary by jurisdiction, but the 90-day cycle is a good default."
        - question: "Do you file the compliance paperwork for me?"
          answer: "We document every trip: gallons pumped, date, truck ID, disposal facility. If your jurisdiction needs a copy, we send one."
        - question: "Can you service a brewery or distillery?"
          answer: "Yes. Spent grain slurry, stillage, wash-down water, fermenter cleanings. We're already hauling it for several Hill Country producers."
    - heading: "Emergency Service"
      items:
        - question: "What counts as an emergency?"
          answer: "Sewage in the house. Toilets won't flush. Drain field smell with standing water. Tank overflow. If you're asking whether it's an emergency — text us and we'll tell you."
        - question: "How fast can you actually get there?"
          answer: "Same day is the goal when the truck is available. Nights and weekends, we aim for a few hours. Texas Hill Country traffic and drive distance get a vote."
    - heading: "Pricing & Scheduling"
      items:
        - question: "How much does a septic pumping cost?"
          answer: "Depends on tank size, access difficulty, and volume removed. Our gallon meter means you pay for what comes out, not a flat rate that penalizes smaller jobs. Call for a real quote — we don't play games."
        - question: "Do you charge extra for weekends?"
          answer: "Emergency calls outside business hours run higher, yes. We'll always quote the number before the truck rolls."
        - question: "What payment do you take?"
          answer: "Card, check, ACH, and the occasional cash. We invoice commercial accounts."

