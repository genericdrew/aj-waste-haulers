how_we_work:
  meta_title: "How We Charge: Proof-of-Pumpage Explained | AJ Liquid Waste Haulers"
  meta_description: "Every AJ truck carries an electronic gallon meter. Here's how proof-of-pumpage works, why it matters, and what the receipt looks like."
  hero:
    eyebrow: "How We Work"
    headline: "You pay for gallons. Not guesses."
    body: "Most septic pumping is priced by the truckload or by an eyeballed estimate. We don't do that. Every AJ vacuum truck runs an electronic solid-state gallon meter that logs waste as it leaves your tank. Here's what that means, and why nobody else around here does it."
  sections:
    - heading: "What a gallon meter is"
      body: "It's a sealed electronic flow meter mounted between your tank and our holding tank. As waste moves through the line, the meter counts gallons in real time. The same technology has been standard in fuel distribution and chemical hauling for decades — it just hasn't been standard in septic."
    - heading: "What it means for your invoice"
      body: "You see the reading. We see the reading. Your invoice shows the gallons pumped, not a flat truck rate. If we pump 600 gallons out of a 1,000-gallon tank, you're not billed as if we hauled a full load."
    - heading: "Why every other company eyeballs it"
      body: "Honest answer: because customers can't see inside a truck, and a truck rate is easier to quote. We think that's how the trust gap started in this industry. Proof-of-pumpage closes it."
    - heading: "What proof you can ask for"
      body: "Meter readout (we photograph it on-site if you want). Manifest from the TCEQ-approved disposal facility. Invoice line showing gallons pumped. Ask — we don't hide anything."
  cta: "Schedule a Metered Pumping"
  cta_href: "/contact/"

what_to_expect:
  meta_title: "What to Expect on Septic Pumping Day | AJ Liquid Waste Haulers"
  meta_description: "Five steps of a septic pumping visit: arrival, access, metered pumpout, inspection, on-site walkthrough, and documented disposal. No surprises."
  hero:
    eyebrow: "What to Expect"
    headline: "From pulling in the drive to hauling off the load."
    body: "Most homeowners have never actually watched a septic pumping. Here's exactly what happens when we show up — so you know what's normal, what to ask about, and when to worry."
  steps:
    - number: "01"
      title: "We arrive (and try not to tear up your yard)"
      body: "We drive hoses across grass, not over it where possible. Our trucks have longer hose runs than most — we can often park on the driveway and reach the tank without rutting the lawn."
    - number: "02"
      title: "We locate your access risers"
      body: "If your tank has risers — great. If the lids are buried, we probe and dig. That's part of the price. We'll re-cover at the end."
    - number: "03"
      title: "Gallon meter on, pumping starts at zero"
      body: "The meter gets connected before a single gallon moves. You can watch the reading climb in real time. We photograph it when we're done."
    - number: "04"
      title: "Inspection + walkthrough"
      body: "While we pump, we check baffle condition, inlet/outlet flow, and sludge layer depth. Before we pack up, we tell you what we saw and what it means for your next pumping window."
    - number: "05"
      title: "Manifest and disposal"
      body: "Every load goes to a TCEQ-approved facility. We log the trip. You can request the manifest anytime."
  cta: "Schedule a Pumping"
  cta_href: "/contact/"

septic_pumping_cost:
  meta_title: "What Does Septic Pumping Cost in Central Texas? | AJ Liquid Waste Haulers"
  meta_description: "Honest guidance on septic pumping costs in the Hill Country. What drives price, what to watch for, and why gallon-meter billing is fairer than flat truck rates."
  hero:
    eyebrow: "Pricing Guide"
    headline: "What septic pumping actually costs around here."
    body: "We don't post a rate card because real pricing depends on tank size, access, waste volume, and where the truck has to drive. But you deserve an honest picture of what drives cost and what's fair. Here it is."
  sections:
    - heading: "The main drivers"
      body: "Tank size, waste volume actually removed, access difficulty (buried lids, distance from driveway), and time of service (weekend, overnight, emergency). A standard 1,000-gallon tank in Dripping Springs runs a different price than the same tank three counties out with a blocked drive."
    - heading: "Why our bill is different"
      body: "Because we meter gallons, you pay for what actually leaves the tank — not for a full truck every time. On smaller tanks or partial pumps, that usually works in your favor. On overfull tanks, you pay for what's really in there, not a discount price for a full haul."
    - heading: "Red flags in a septic quote"
      body: "A flat rate with no volume discussion. A price that sounds too low (usually means they'll 'find issues' on-site). No mention of disposal or manifest. No insurance. No license. These are real red flags — not just us talking up the competition."
    - heading: "How to get a real number from us"
      body: "Call with your tank size (if you know it), your address, and a rough timeline. We'll quote a range based on access and volume, and we'll hold that range once we see the job."
  cta: "Get a Real Quote"
  cta_href: "/contact/"

drought_and_septic:
  meta_title: "Drought and Your Septic System: A Hill Country Guide | AJ Liquid Waste Haulers"
  meta_description: "Central Texas is in Stage 3 drought. Here's what prolonged drought does to a drain field, why septic failures spike in dry years, and what to do about it."
  hero:
    eyebrow: "Hill Country Guide"
    headline: "44 months of drought, and your drain field is paying attention."
    body: "The Barton Springs segment of the Edwards Aquifer has been in drought for over three and a half years. Stage 3 restrictions are active across most of Central Texas. What most homeowners don't realize is that drought doesn't just stress their water supply — it stresses the biological system that treats their wastewater."
  sections:
    - heading: "What drought does underground"
      body: "Your drain field relies on soil microbes breaking down effluent. Those microbes need moisture. When soil dries and compacts, treatment slows. Effluent travels farther than it should before it's fully processed. In a bad drought year, drain fields that worked fine for 20 years start to back up."
    - heading: "Why failures cluster during dry periods"
      body: "Two reasons. First: dry soil compacts and seals, so effluent pools instead of percolating. Second: households often use more water during drought (hotter weather, irrigation workarounds) just as the drain field's capacity drops. The system gets more input and less output."
    - heading: "What to watch for"
      body: "Slow drains in multiple fixtures at once. Gurgling when the washing machine drains. Greener grass in a stripe over the drain field — that's effluent surfacing. Unusual smell near the lateral lines. Any of these, get a pump and an inspection."
    - heading: "What helps"
      body: "Shorter pumping intervals during drought years (a 3-year tank might need 2 years). Fixing leaky fixtures. Spreading laundry across days rather than running 4 loads on Saturday. Not driving heavy equipment over the drain field. And — we'll say it — having someone check the tank who actually measures what comes out."
  cta: "Schedule a Drought-Year Pumping"
  cta_href: "/contact/"

grease_trap_compliance:
  meta_title: "Austin Grease Trap Compliance Guide | AJ Liquid Waste Haulers"
  meta_description: "Austin requires grease trap pumping every 90 days. Fines run up to $2,000 per violation. Here's how to stay compliant, what to document, and how AJ handles the paperwork."
  hero:
    eyebrow: "Restaurant Operators"
    headline: "Austin's 90-day rule, in plain English."
    body: "If you run a food service business inside Austin city limits, grease trap pumping isn't optional and it isn't annual. The city requires pumping every 90 days — or sooner if grease and solids reach 50% of the wetted height. Violations run up to $2,000. Here's how to keep the inspector happy and the kitchen open."
  sections:
    - heading: "What the 90-day rule actually says"
      body: "Austin Water's FOG (Fats, Oils, Grease) program requires interior grease traps to be pumped on a 90-day schedule, and exterior interceptors on a similar cycle depending on size. The rule exists because grease buildup in municipal sewer lines causes backups, overflows, and environmental violations — the city fines restaurants because grease upstream is cheaper to stop than sewage downstream."
    - heading: "What you have to document"
      body: "Date of each pumping. Volume removed. Name and license of the hauler. Disposal facility. Most inspectors want to see a written log or invoice stack covering the last 12 months."
    - heading: "How AJ handles it"
      body: "We schedule you on a fixed 90-day cycle. We pump during slow hours (overnight or pre-open). We leave a printed service record after every visit and email a PDF for your records. If an inspector shows up, you have the paperwork."
    - heading: "What happens if you fall behind"
      body: "Notice of violation first, usually. Fines escalate. In repeat cases, the city can require more frequent pumping at your expense. The cheapest way to stay compliant is to not fall behind in the first place."
  cta: "Get on a 90-Day Schedule"
  cta_href: "/contact/"
