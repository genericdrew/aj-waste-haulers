faq_teaser:
  # FAQPage JSON-LD schema on these 4. First-mover — 0/5 competitors have schema.
  eyebrow: "Common Questions"
  headline: "The four things people ask us most."
  items:
    - question: "How often does a septic tank need to be pumped?"
      answer: "TCEQ's rule of thumb is every 3–5 years for a household. Run a big family or a garbage disposal? Closer to 2–3. Use our estimator for a tighter number, or call and we'll walk you through it."
    - question: "What is proof-of-pumpage?"
      answer: "It means we record the actual gallons we remove from your tank — not our best guess. Our trucks have electronic meters. You see the reading. The invoice matches. It's the only way to charge honestly for invisible work."
    - question: "Do you serve my area?"
      answer: "We cover Dripping Springs, Austin, Kyle, New Braunfels, Driftwood, and most of the Hill Country around Hays, Travis, and Comal counties. Not sure? Enter your ZIP above, or just call."
    - question: "What happens if I wait too long between pumpings?"
      answer: "Sludge builds up, overflows into the drain field, and you're looking at a $10,000–$30,000 replacement instead of a $400 pumping. That's the honest math. Don't wait for the backup."
  see_all_cta: "See all FAQs"
  see_all_href: "/faq/"

