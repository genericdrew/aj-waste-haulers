why_aj:
  # Peak-End moment — the thesis made visible. (homepage-sections.md §5 position 5)
  eyebrow: "Why AJ"
  headline: "The only Hill Country hauler that proves every gallon."
  body: "Most septic companies eyeball it. We don't. Every AJ truck carries an electronic solid-state gallon meter that records exactly how much waste leaves your tank. You get the number. We get the number. The receipt matches the number. It's how the meter industry has worked for decades — it's just never been the default in septic."
  image_alt: "Close-up of the electronic gallon meter on an AJ pump truck"
  image: "/images/why-aj-gallon-meter.jpg"
  pillars:
    - title: "Proof-of-Pumpage"
      body: "Electronic solid-state meters on every truck. What we measure is what you pay for. No estimating."
      icon: "gauge"
    - title: "40+ Years Combined"
      body: "Founders James Ashman and Gerry Jones have been working in and around septic and waste hauling for four decades between them."
      icon: "award"
    - title: "Dripping Springs HQ"
      body: "We live here. Our trucks are parked here. We're not commuting in from a dispatch office two counties away."
      icon: "pin"
    - title: "TCEQ-Approved Disposal"
      body: "Every load goes to a TCEQ-approved facility. We keep the manifest. You can ask for a copy."
      icon: "shield"

process:
  # 5 steps. No competitor explains the visit (homepage-sections.md §3 FIRST-MOVER).
  eyebrow: "What Happens Next"
  headline: "A pumping visit, start to finish."
  subhead: "Five steps. Thirty to ninety minutes, most days."
  steps:
    - number: "01"
      title: "We arrive and find your access"
      body: "Lids get buried. Drives get mulched over. We walk the property, locate the risers, and clear what we have to."
    - number: "02"
      title: "We measure what's in the tank"
      body: "Gallon meter gets hooked up before a single pump stroke. The reading starts at zero."
    - number: "03"
      title: "We pump and inspect"
      body: "Baffle condition, sludge depth, signs of drain-field backup. We'll tell you what we see."
    - number: "04"
      title: "We walk you through the reading"
      body: "On-site explanation of the gallons pulled, the tank's condition, and whether you should expect a shorter or longer interval next time."
    - number: "05"
      title: "Waste goes to a TCEQ-approved facility"
      body: "Every load is manifested. Ask for a copy and you'll get one."

